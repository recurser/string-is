name: eslint

on: [pull_request]

jobs:
  eslint:
    runs-on: ubicloud
    steps:
      - uses: "actions/checkout@v4"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache:        "yarn"
      - name: Install packages
        run: "yarn install"
      - name: Run eslint
        run: "yarn eslint"
